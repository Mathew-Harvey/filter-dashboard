<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Baleen Filter Skid — Supervisor Monitor</title>
<style>
  :root {
    --bg0: #eef2f6;
    --bg1: #f8fafc;
    --panel: #ffffff;
    --panel2: #f1f5f9;
    --line: #d8e2ec;
    --line2: #c5d3e0;
    --text: #0f172a;
    --muted: #5b6b7c;
    --accent: #0891b2;
    --accent2: #2E86AB;
    --flow: #0284c7;
    --pressure: #7c3aed;
    --ok: #059669;
    --warn: #d97706;
    --alarm: #dc2626;
    --stale: #94a3b8;
    --glow-ok: rgba(5,150,105,.18);
    --glow-warn: rgba(217,119,6,.18);
    --glow-alarm: rgba(220,38,38,.2);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; min-height: 100%;
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(8,145,178,.07), transparent 60%),
      radial-gradient(900px 500px at 90% 0%, rgba(124,58,237,.05), transparent 55%),
      linear-gradient(180deg, var(--bg0), var(--bg1));
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
  }

  .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }

  /* ---- header ---- */
  header {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    padding: 20px 28px;
    border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 10;
  }
  .brand { display: flex; flex-direction: column; gap: 2px; }
  header h1 {
    margin: 0; font-size: 18px; font-weight: 700; letter-spacing: .3px;
    background: linear-gradient(90deg, #0f172a 0%, #0891b2 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header .sub { color: var(--muted); font-size: 12.5px; letter-spacing: .8px; text-transform: uppercase; }
  .conn {
    margin-left: auto; display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--muted); padding: 6px 14px;
    border: 1px solid var(--line); border-radius: 999px; background: var(--panel);
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--stale);
    transition: background .3s, box-shadow .3s;
  }
  .dot.live {
    background: var(--ok);
    box-shadow: 0 0 0 3px rgba(5,150,105,.2);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 3px rgba(5,150,105,.18); }
    50% { box-shadow: 0 0 0 6px rgba(5,150,105,.08); }
  }

  #alarmbar { padding: 0 28px; }
  #alarmbar .strip {
    display: none; margin: 16px 0 0; padding: 12px 16px;
    border-radius: 10px;
    background: linear-gradient(90deg, rgba(220,38,38,.08), rgba(220,38,38,.03));
    border: 1px solid rgba(220,38,38,.35);
    color: #991b1b; font-size: 13px;
    box-shadow: 0 4px 16px rgba(220,38,38,.08);
  }
  #alarmbar .strip.show { display: block; }
  #alarmbar .strip b { color: #7f1d1d; }

  main { padding: 12px 28px 48px; max-width: 1400px; margin: 0 auto; }

  /* ---- sections ---- */
  .group { margin-top: 32px; }
  .group-head {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .group-head h2 {
    margin: 0; font-size: 11px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
  }
  .group-head .pill {
    font-size: 10px; padding: 3px 10px; border-radius: 999px;
    border: 1px solid var(--line2); color: var(--accent); background: rgba(8,145,178,.06);
  }
  .group-head::after {
    content: ""; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--line2), transparent);
  }

  /* ---- grids ---- */
  .grid-gauges {
    display: grid; gap: 16px;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  }
  .grid-metrics {
    display: grid; gap: 14px; margin-top: 14px;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  }
  .grid-faults {
    display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  }

  /* ---- cards ---- */
  .card {
    position: relative; overflow: hidden;
    background: linear-gradient(145deg, var(--panel) 0%, var(--panel2) 100%);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px 18px 14px;
    transition: border-color .25s, box-shadow .25s, transform .2s;
    box-shadow: 0 2px 12px rgba(15,23,42,.06);
  }
  .card::before {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.8), transparent 50%);
    pointer-events: none; border-radius: inherit;
  }
  .card.ok    { border-color: rgba(5,150,105,.45); box-shadow: 0 0 20px var(--glow-ok), 0 2px 12px rgba(15,23,42,.06); }
  .card.warn  { border-color: rgba(217,119,6,.5);  box-shadow: 0 0 20px var(--glow-warn), 0 2px 12px rgba(15,23,42,.06); }
  .card.alarm { border-color: rgba(220,38,38,.5); box-shadow: 0 0 24px var(--glow-alarm), 0 2px 12px rgba(15,23,42,.06); }
  .card.stale { opacity: .55; border-color: var(--line); box-shadow: none; }

  .card.gauge-card { padding: 20px 18px 12px; min-height: 260px; }
  .card.gauge-card.flow  { --gauge-color: var(--flow); }
  .card.gauge-card.press { --gauge-color: var(--pressure); }

  .card-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 8px; margin-bottom: 4px; position: relative; z-index: 1;
  }
  .card-top .title { font-size: 13px; color: var(--muted); font-weight: 500; }
  .card-top .key {
    font-size: 10px; font-weight: 700; letter-spacing: .6px;
    color: var(--accent); opacity: .85;
  }

  /* ---- SVG gauge ---- */
  .gauge-wrap {
    display: flex; justify-content: center; align-items: center;
    position: relative; z-index: 1; margin: -4px 0 0;
  }
  .gauge-svg { width: 100%; max-width: 240px; height: auto; display: block; }
  .gauge-track { fill: none; stroke: var(--line2); stroke-width: 10; stroke-linecap: round; }
  .gauge-zone-warn { fill: none; stroke: rgba(251,191,36,.25); stroke-width: 10; stroke-linecap: round; }
  .gauge-zone-alarm { fill: none; stroke: rgba(248,113,113,.3); stroke-width: 10; stroke-linecap: round; }
  .gauge-fill {
    fill: none; stroke: var(--gauge-color, var(--accent));
    stroke-width: 10; stroke-linecap: round;
    filter: drop-shadow(0 0 6px var(--gauge-color, var(--accent)));
    transition: stroke-dashoffset .4s ease;
  }
  .gauge-needle {
    fill: var(--gauge-color, var(--accent));
    filter: drop-shadow(0 0 4px var(--gauge-color, var(--accent)));
    transition: transform .4s ease;
    transform-origin: 100px 100px;
  }
  .gauge-center {
    fill: var(--panel); stroke: var(--line2); stroke-width: 1;
  }
  .gauge-readout {
    text-anchor: middle; fill: var(--text);
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 22px; font-weight: 700;
  }
  .gauge-unit-txt {
    text-anchor: middle; fill: var(--muted);
    font-size: 11px; font-weight: 500;
  }
  .gauge-tick { stroke: var(--line2); stroke-width: 1; }
  .gauge-tick-label {
    fill: var(--muted); font-size: 8px;
    font-family: ui-monospace, Menlo, monospace;
  }

  /* ---- metric cards ---- */
  .metric-value {
    font-size: 32px; font-weight: 700; line-height: 1;
    margin: 8px 0 2px; position: relative; z-index: 1;
  }
  .metric-value .u { font-size: 14px; color: var(--muted); font-weight: 500; margin-left: 4px; }

  /* ---- sparkline ---- */
  .spark { margin-top: 12px; position: relative; z-index: 1; }
  .spark-meta {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10px; color: var(--muted); margin-bottom: 5px; letter-spacing: .3px;
  }
  .spark-meta .trail { color: var(--accent2); font-weight: 600; text-transform: uppercase; letter-spacing: .8px; }
  .spark canvas { width: 100%; height: 52px; display: block; border-radius: 6px; }

  .age {
    font-size: 10px; color: var(--muted); margin-top: 8px;
    position: relative; z-index: 1; opacity: .8;
  }

  /* ---- digital faults ---- */
  .fault-card { text-align: center; padding: 20px 14px; }
  .fault-led {
    width: 56px; height: 56px; border-radius: 50%; margin: 8px auto 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; letter-spacing: .5px;
    border: 2px solid var(--line2);
    background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.08), transparent);
    transition: all .3s;
  }
  .fault-card.ok .fault-led {
    border-color: rgba(5,150,105,.45);
    background: radial-gradient(circle at 35% 30%, rgba(5,150,105,.2), rgba(5,150,105,.05));
    color: var(--ok); box-shadow: 0 0 24px var(--glow-ok);
  }
  .fault-card.alarm .fault-led {
    border-color: rgba(220,38,38,.5);
    background: radial-gradient(circle at 35% 30%, rgba(220,38,38,.25), rgba(220,38,38,.06));
    color: var(--alarm); box-shadow: 0 0 28px var(--glow-alarm);
    animation: fault-blink 1.2s ease-in-out infinite;
  }
  .fault-card.stale .fault-led { color: var(--stale); }
  @keyframes fault-blink {
    0%, 100% { opacity: 1; }
    50% { opacity: .7; }
  }
  .fault-name { font-size: 12px; color: var(--muted); line-height: 1.35; }

  @media (max-width: 640px) {
    header, main, #alarmbar { padding-left: 16px; padding-right: 16px; }
    .metric-value { font-size: 26px; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>Baleen Filter Skid</h1>
    <span class="sub">F12159 · supervisor monitor</span>
  </div>
  <span class="conn"><span class="dot" id="dot"></span><span id="connText">connecting…</span></span>
</header>
<div id="alarmbar"><div class="strip" id="strip"></div></div>
<main id="main"></main>

<script>
const GAUGE_CFG = {
  'FLM-W': { min: 0, max: 3000, color: '#0284c7', ticks: [0, 750, 1500, 2250, 3000] },
  'BFP':   { min: 0, max: 6,    color: '#7c3aed', ticks: [0, 1.5, 3, 4.5, 6] },
};
const GAUGE_KEYS = new Set(Object.keys(GAUGE_CFG));
const SPARK_LEN = 180;

const state = {
  tags: {}, cards: {}, spark: {}, pollIntervalMs: 5000, lastMsgTs: 0,
};

function formatValue(v, decimals) {
  if (v == null) return '—';
  return Number(v).toFixed(decimals ?? 2);
}

function ageText(ts) {
  const s = Math.round((Date.now() - ts) / 1000);
  if (s < 2) return 'just now';
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.round(s / 60) + 'm ago';
  return Math.round(s / 3600) + 'h ago';
}

function statusColor(status) {
  return { ok: '#059669', warn: '#d97706', alarm: '#dc2626', stale: '#94a3b8' }[status] || '#94a3b8';
}

/* ---- gauge SVG builder ---- */
function gaugeSvgHtml(key) {
  const g = GAUGE_CFG[key];
  const ticks = g.ticks.map((v, i) => {
    const ratio = (v - g.min) / (g.max - g.min);
    const angle = Math.PI * (1 + ratio);
    const x1 = 100 + 72 * Math.cos(angle), y1 = 100 + 72 * Math.sin(angle);
    const x2 = 100 + 82 * Math.cos(angle), y2 = 100 + 82 * Math.sin(angle);
    const lx = 100 + 92 * Math.cos(angle), ly = 100 + 92 * Math.sin(angle);
    return `<line class="gauge-tick" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>
      <text class="gauge-tick-label" x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle">${v}</text>`;
  }).join('');
  return `<div class="gauge-wrap">
    <svg class="gauge-svg" viewBox="0 0 200 130" aria-hidden="true">
      <path class="gauge-track" d="" id="track-${key}"/>
      <path class="gauge-fill" d="" id="fill-${key}"/>
      ${ticks}
      <circle class="gauge-center" cx="100" cy="100" r="28"/>
      <polygon class="gauge-needle" points="100,100 98,55 102,55" id="needle-${key}"/>
      <text class="gauge-readout mono" x="100" y="98" id="gval-${key}">—</text>
      <text class="gauge-unit-txt" x="100" y="114" id="gunit-${key}"></text>
    </svg>
  </div>`;
}

function arcPath(cx, cy, r, startRatio, endRatio) {
  const a0 = Math.PI * (1 + startRatio), a1 = Math.PI * (1 + endRatio);
  const x0 = cx + r * Math.cos(a0), y0 = cy + r * Math.sin(a0);
  const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
  const large = (endRatio - startRatio) > 0.5 ? 1 : 0;
  return `M ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1}`;
}

function updateGauge(key, value, unit, status) {
  const g = GAUGE_CFG[key];
  const card = state.cards[key];
  if (!card || !g) return;

  const track = card.querySelector(`#track-${key}`);
  const fill = card.querySelector(`#fill-${key}`);
  const needle = card.querySelector(`#needle-${key}`);
  const gval = card.querySelector(`#gval-${key}`);
  const gunit = card.querySelector(`#gunit-${key}`);
  if (!track) return;

  const fullArc = arcPath(100, 100, 78, 0, 1);
  track.setAttribute('d', fullArc);

  const col = status === 'stale' || value == null ? '#94a3b8' : g.color;
  fill.style.stroke = col;
  if (needle) needle.style.fill = col;

  if (value == null) {
    gval.textContent = '—';
    gunit.textContent = unit || '';
    fill.setAttribute('d', '');
    if (needle) needle.style.transform = 'rotate(-90deg)';
    return;
  }

  const ratio = Math.max(0, Math.min(1, (value - g.min) / (g.max - g.min)));
  const t = state.tags[key];
  gval.textContent = formatValue(value, t?.decimals ?? 2);
  gunit.textContent = unit || '';

  if (ratio > 0.002) {
    fill.setAttribute('d', arcPath(100, 100, 78, 0, ratio));
  } else {
    fill.setAttribute('d', '');
  }

  const angle = -90 + ratio * 180;
  if (needle) needle.style.transform = `rotate(${angle}deg)`;
}

/* ---- sparkline ---- */
function pushSpark(key, ts, value) {
  if (value == null) return;
  if (!state.spark[key]) state.spark[key] = [];
  const arr = state.spark[key];
  const last = arr[arr.length - 1];
  if (!last || last.v !== value || ts - last.t > 500) {
    arr.push({ t: ts, v: value });
    if (arr.length > SPARK_LEN) arr.shift();
  }
}

function drawSpark(key, status) {
  const card = state.cards[key];
  if (!card) return;
  const canvas = card.querySelector('.spark-canvas');
  if (!canvas) return;

  const pts = state.spark[key] || [];
  const dpr = devicePixelRatio;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (!w) return;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const col = statusColor(status);
  const meta = card.querySelector('.spark-range');
  if (pts.length < 2) {
    ctx.strokeStyle = 'rgba(46,134,171,.2)';
    ctx.setLineDash([4 * dpr, 4 * dpr]);
    ctx.beginPath();
    ctx.moveTo(0, canvas.height / 2);
    ctx.lineTo(canvas.width, canvas.height / 2);
    ctx.stroke();
    if (meta) meta.textContent = 'collecting…';
    return;
  }

  const vals = pts.map(p => p.v);
  let min = Math.min(...vals), max = Math.max(...vals);
  if (min === max) { min -= 1; max += 1; }
  const pad = (max - min) * 0.08 || 0.5;
  min -= pad; max += pad;
  const span = max - min;

  const x = i => (i / (pts.length - 1)) * canvas.width;
  const y = v => canvas.height - ((v - min) / span) * (canvas.height - 8 * dpr) - 4 * dpr;

  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  const rgba = hexToRgba(col, .22);
  const rgba0 = hexToRgba(col, 0);
  grad.addColorStop(0, rgba);
  grad.addColorStop(1, rgba0);

  ctx.beginPath();
  pts.forEach((p, i) => i ? ctx.lineTo(x(i), y(p.v)) : ctx.moveTo(x(i), y(p.v)));
  ctx.lineTo(canvas.width, canvas.height);
  ctx.lineTo(0, canvas.height);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.beginPath();
  ctx.strokeStyle = col;
  ctx.lineWidth = 2 * dpr;
  ctx.lineJoin = 'round';
  pts.forEach((p, i) => i ? ctx.lineTo(x(i), y(p.v)) : ctx.moveTo(x(i), y(p.v)));
  ctx.stroke();

  const last = vals[vals.length - 1];
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.arc(x(pts.length - 1), y(last), 3.5 * dpr, 0, Math.PI * 2);
  ctx.fill();

  if (meta) meta.textContent = `min ${min.toFixed(1)} · max ${max.toFixed(1)}`;
}

function hexToRgba(hex, a) {
  if (!hex.startsWith('#')) return `rgba(46,134,171,${a})`;
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}

async function seedSpark(key) {
  try {
    const rows = await (await fetch(`/api/history?key=${encodeURIComponent(key)}&hours=1`)).json();
    if (!rows.length) return;
    const step = Math.max(1, Math.floor(rows.length / SPARK_LEN));
    state.spark[key] = rows.filter((_, i) => i % step === 0).map(r => ({ t: r.ts, v: r.value }));
  } catch { /* ignore */ }
}

/* ---- build DOM ---- */
function cardHtml(t) {
  const spark = `<div class="spark">
    <div class="spark-meta"><span class="trail">live trail</span><span class="spark-range">collecting…</span></div>
    <canvas class="spark-canvas"></canvas>
  </div>`;

  if (GAUGE_KEYS.has(t.key)) {
    const cls = t.key === 'FLM-W' ? 'flow' : 'press';
    return `<div class="card gauge-card ${cls} stale" data-key="${t.key}">
      <div class="card-top"><span class="title">${t.name}</span><span class="key">${t.key}</span></div>
      ${gaugeSvgHtml(t.key)}
      ${spark}
      <div class="age">no data</div>
    </div>`;
  }

  if (t.type === 'digital') {
    return `<div class="card fault-card stale" data-key="${t.key}">
      <div class="card-top"><span class="title">${t.name}</span><span class="key">${t.key}</span></div>
      <div class="fault-led">—</div>
      <div class="fault-name">${t.name}</div>
      <div class="age">no data</div>
    </div>`;
  }

  return `<div class="card stale" data-key="${t.key}">
    <div class="card-top"><span class="title">${t.name}</span><span class="key">${t.key}</span></div>
    <div class="metric-value mono body-val">—<span class="u">${t.unit || ''}</span></div>
    ${spark}
    <div class="age">no data</div>
  </div>`;
}

async function build() {
  const cfg = await (await fetch('/api/config')).json();
  state.pollIntervalMs = cfg.pollIntervalMs || 5000;
  const main = document.getElementById('main');
  const groups = {};
  for (const t of cfg.tags) {
    state.tags[t.key] = t;
    (groups[t.gateway] ||= []).push(t);
  }

  for (const [gw, tags] of Object.entries(groups)) {
    const sec = document.createElement('section');
    sec.className = 'group';
    const gauges = tags.filter(t => GAUGE_KEYS.has(t.key));
    const metrics = tags.filter(t => t.type === 'analog' && !GAUGE_KEYS.has(t.key));
    const faults = tags.filter(t => t.type === 'digital');

    let inner = `<div class="group-head"><h2>${gw}</h2><span class="pill">${tags.length} tags</span></div>`;

    if (gauges.length) {
      inner += `<div class="grid-gauges">${gauges.map(cardHtml).join('')}</div>`;
    }
    if (metrics.length) {
      inner += `<div class="grid-metrics">${metrics.map(cardHtml).join('')}</div>`;
    }
    if (faults.length) {
      inner += `<div class="grid-faults">${faults.map(cardHtml).join('')}</div>`;
    }
    sec.innerHTML = inner;
    main.appendChild(sec);

    for (const t of tags) {
      const el = sec.querySelector(`[data-key="${t.key}"]`);
      if (el) state.cards[t.key] = el;
      if (t.type === 'analog') seedSpark(t.key);
    }
  }
}

function render(data) {
  const activeAlarms = [];

  for (const [key, r] of Object.entries(data)) {
    const t = state.tags[key], card = state.cards[key];
    if (!t || !card) continue;

    const base = GAUGE_KEYS.has(key) ? `card gauge-card ${key === 'FLM-W' ? 'flow' : 'press'}` :
      t.type === 'digital' ? 'card fault-card' : 'card';
    card.className = `${base} ${r.status}`;

    if (t.type === 'digital') {
      const led = card.querySelector('.fault-led');
      const label = r.status === 'alarm' ? 'FAULT' : r.status === 'stale' ? '—' : 'OK';
      if (led) led.textContent = label;
    } else if (GAUGE_KEYS.has(key)) {
      updateGauge(key, r.value, r.unit || t.unit, r.status);
      pushSpark(key, r.ts, r.value);
      drawSpark(key, r.status);
    } else {
      const body = card.querySelector('.body-val');
      if (body) {
        const v = formatValue(r.value, t.decimals);
        body.innerHTML = `${v}<span class="u">${r.unit || ''}</span>`;
      }
      pushSpark(key, r.ts, r.value);
      drawSpark(key, r.status);
    }

    const age = card.querySelector('.age');
    if (age) age.textContent = r.value == null ? 'no data' : ageText(r.ts);

    if (r.status === 'alarm') activeAlarms.push(t.name);
    else if (r.status === 'warn') activeAlarms.push(t.name + ' (warn)');
  }

  const strip = document.getElementById('strip');
  if (activeAlarms.length) {
    strip.innerHTML = `<b>${activeAlarms.length} active:</b> ${activeAlarms.join(' · ')}`;
    strip.classList.add('show');
  } else {
    strip.classList.remove('show');
  }
}

function connect() {
  const ws = new WebSocket(`ws://${location.host}/ws`);
  const dot = document.getElementById('dot'), txt = document.getElementById('connText');
  ws.onopen = () => { dot.classList.add('live'); txt.textContent = 'live'; };
  ws.onclose = () => { dot.classList.remove('live'); txt.textContent = 'reconnecting…'; setTimeout(connect, 2000); };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'snapshot') { state.lastMsgTs = Date.now(); render(msg.data); }
  };
}

setInterval(() => {
  const dot = document.getElementById('dot');
  const txt = document.getElementById('connText');
  const stallMs = state.pollIntervalMs * 4 + 2000;
  if (state.lastMsgTs && Date.now() - state.lastMsgTs > stallMs) {
    dot.classList.remove('live');
    txt.textContent = 'stalled';
  } else if (txt.textContent === 'stalled') {
    txt.textContent = 'live';
    dot.classList.add('live');
  }
}, 1000);

// Redraw sparklines on resize
window.addEventListener('resize', () => {
  for (const key of Object.keys(state.cards)) {
    const t = state.tags[key];
    if (t?.type === 'analog') drawSpark(key, 'ok');
  }
});

build().then(async () => {
  try {
    const snap = await (await fetch('/api/snapshot')).json();
    if (snap.data) render(snap.data);
  } catch { /* ws will follow */ }
  connect();
});
</script>
</body>
</html>
